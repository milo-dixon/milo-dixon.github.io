baseURL = 'https://milo-dixon.github.io/'
languageCode = 'en-us'
title = 'Improper Storytelling'
theme = 'ananke'
enableRobotsTXT = true
summaryLength = 28

[params]
  author = 'Milo Dixon'
  description = 'Fiction, poetry, musings, and projects by Milo Dixon.'
  homeHeadline = 'Fiction, Poetry, and Musings by Milo Dixon'
  homeIntro = 'Improper Storytelling is the author site of Milo Dixon.'
  copyright = 'Milo Dixon'

[permalinks]
  stories = '/stories/:slug/'
  poems = '/poems/:slug/'

[menu]
  [[menu.main]]
    name = 'Works'
    pageRef = '/works'
