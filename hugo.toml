  [[menu.main]]
    name = 'Stories'
    pageRef = '/stories'
    weight = 10
  [[menu.main]]
    name = 'Poems'
    pageRef = '/poems'
    weight = 20
  [[menu.main]]
    name = 'Database'
    pageRef = '/database'
    weight = 30
  [[menu.main]]
    name = 'About'
    pageRef = '/about'
    weight = 60

[caches]
  [caches.images]
    dir = ':cacheDir/images'

[[menu.main]]
  name = "Contact"
  url = "/contact/"
  weight = 70


